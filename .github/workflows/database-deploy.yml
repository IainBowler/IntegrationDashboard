name: Database CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'database/**'
      - '.github/workflows/database-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest  # switch to windows-latest if SqlPackage isn't found on the runner
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build DACPAC
        run: dotnet build database/IntegrationDashboard.Database.sqlproj -c Release

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy DACPAC
        uses: azure/sql-action@v2.3
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          path: database/bin/Release/IntegrationDashboard.Database.dacpac
          action: publish
